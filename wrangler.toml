name = "cybersystema-web"
main = ".open-next/worker.js"
compatibility_date = "2026-04-29"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

[vars]
NODE_ENV = "production"

